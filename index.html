<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classroom Tools Suite</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>📚 Classroom Tools Suite</h1>
    <p>Teacher Productivity Toolkit</p>
  </header>

  <main class="grid">

    <!-- TIMER -->
    <section class="card">
      <h2>⏰ Classroom Timer</h2>

      <div class="timer-display" id="timerDisplay">05:00</div>

      <input type="number" id="minutesInput" placeholder="Minutes" min="1"/>

      <div class="buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
      </div>
    </section>

    <!-- SEATING CHART -->
    <section class="card">
      <h2>🪑 Seating Chart Generator</h2>

      <textarea id="studentNames" placeholder="Enter names separated by commas"></textarea>

      <button onclick="generateSeats()">Generate Seating</button>

      <div id="seatOutput" class="seat-grid"></div>
    </section>

    <!-- BEHAVIOR TRACKER -->
    <section class="card">
      <h2>⭐ Behavior Tracker</h2>

      <input type="text" id="behaviorName" placeholder="Student Name"/>

      <div class="buttons">
        <button onclick="addPoint()">+ Positive</button>
        <button onclick="removePoint()">- Negative</button>
      </div>

      <ul id="behaviorList"></ul>
    </section>

    <!-- QR GENERATOR -->
    <section class="card">
      <h2>🔗 QR Code Generator</h2>

      <input type="text" id="qrText" placeholder="Enter URL or text"/>

      <button onclick="generateQR()">Generate QR</button>

      <div id="qrcode"></div>
    </section>

  </main>

  <footer>
    Classroom Tools Suite Prototype
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
