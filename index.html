<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seat Generator</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <div class="container">

    <h1>🎓 Classroom Seat Generator</h1>

    <div class="controls">

      <textarea id="studentNames" placeholder="Enter up to 25 student names (one per line)"></textarea>

      <div class="buttons">
        <button id="generateBtn">Generate Seats</button>
        <button id="shuffleBtn">Shuffle</button>
        <button id="pdfBtn">Save as PDF</button>
        <button id="clearBtn">Clear</button>
      </div>

      <p class="note">
        Seat Colors:
        🟨 1-8 |
        🟦 9-16 |
        🟥 17-25
      </p>

    </div>

    <div id="pdfContent">

      <div class="teacher-area">
        👩‍🏫 TEACHER
      </div>

      <div id="seatGrid" class="seat-grid"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
